name: Build Release

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2" --locked

      - name: Build Windows
        run: cargo tauri build
        working-directory: src-tauri

      - name: Create portable zip
        shell: pwsh
        run: |
          $exe = Get-ChildItem "target/release/coinman-portfolio.exe"
          Compress-Archive -Path $exe.FullName -DestinationPath "coinman-portfolio-windows-x64.zip"

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: coinman-windows-x64
          path: coinman-portfolio-windows-x64.zip

  build-macos:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2" --locked

      - name: Build macOS (x86_64)
        run: cargo tauri build --target x86_64-apple-darwin
        working-directory: src-tauri

      - name: Build macOS (aarch64)
        run: cargo tauri build --target aarch64-apple-darwin
        working-directory: src-tauri

      - name: Upload x86_64 artifact
        uses: actions/upload-artifact@v4
        with:
          name: coinman-macos-x86_64
          path: src-tauri/target/x86_64-apple-darwin/release/bundle/dmg/*.dmg

      - name: Upload aarch64 artifact
        uses: actions/upload-artifact@v4
        with:
          name: coinman-macos-aarch64
          path: src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg
