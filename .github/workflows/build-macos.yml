name: Build Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2" --locked

      - name: Build Windows
        run: cargo tauri build --bundles nsis
        working-directory: src-tauri

      - name: Create portable zip
        shell: pwsh
        run: |
          $exe = Get-ChildItem "target/release/coinman-portfolio.exe"
          Compress-Archive -Path $exe.FullName -DestinationPath "coinman-portfolio-windows-x64.zip"

      - name: Upload to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload ${{ github.ref_name }} coinman-portfolio-windows-x64.zip --repo ${{ github.repository }}

  build-macos:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2" --locked

      - name: Build macOS (x86_64)
        run: cargo tauri build --target x86_64-apple-darwin --bundles dmg
        working-directory: src-tauri

      - name: Build macOS (aarch64)
        run: cargo tauri build --target aarch64-apple-darwin --bundles dmg
        working-directory: src-tauri

      - name: Rename DMGs
        run: |
          cp target/x86_64-apple-darwin/release/bundle/dmg/*.dmg coinman-portfolio-macos-x64.dmg
          cp target/aarch64-apple-darwin/release/bundle/dmg/*.dmg coinman-portfolio-macos-arm64.dmg

      - name: Upload to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload ${{ github.ref_name }} coinman-portfolio-macos-x64.dmg --repo ${{ github.repository }}
          gh release upload ${{ github.ref_name }} coinman-portfolio-macos-arm64.dmg --repo ${{ github.repository }}

  build-linux:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2" --locked

      - name: Build Linux
        run: cargo tauri build --bundles deb
        working-directory: src-tauri

      - name: Create portable tar.gz
        run: |
          cp target/release/coinman-portfolio .
          tar -czf coinman-portfolio-linux-x64.tar.gz coinman-portfolio

      - name: Upload to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload ${{ github.ref_name }} coinman-portfolio-linux-x64.tar.gz --repo ${{ github.repository }}
