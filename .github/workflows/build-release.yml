name: Build Release

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - dev
    tags:
      - "v*"
  pull_request:

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.name }})
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: "Windows x64"
            platform: "windows-latest"
            args: "--target x86_64-pc-windows-msvc --bundles nsis"
          - name: "macOS Intel"
            platform: "macos-latest"
            args: "--target x86_64-apple-darwin --bundles dmg"
          - name: "macOS Silicon"
            platform: "macos-latest"
            args: "--target aarch64-apple-darwin --bundles dmg"
          - name: "Linux x64"
            platform: "ubuntu-22.04"
            args: "--bundles deb"

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v5

      - name: Install system dependencies (Linux only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2" --locked

      - name: Set Version from Tag or Branch
        shell: bash
        run: |
          if [[ $GITHUB_REF == refs/tags/v* ]]; then
            VERSION=${GITHUB_REF#refs/tags/v}
          else
            VERSION="0.0.0-${GITHUB_REF_NAME}"
          fi
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "Setting version to: $VERSION"

      - name: Update Version in Files
        shell: python
        run: |
          import json, re, os
          version = os.environ.get('VERSION')

          with open('src-tauri/tauri.conf.json', 'r+', encoding='utf-8') as f:
              d = json.load(f)
              d['version'] = version
              f.seek(0)
              json.dump(d, f, indent=4)
              f.truncate()

          with open('src-tauri/Cargo.toml', 'r+', encoding='utf-8') as f:
              content = f.read()
              content = re.sub(r'^version\s*=\s*".*"', f'version = "{version}"', content, flags=re.MULTILINE)
              f.seek(0)
              f.write(content)
              f.truncate()

          with open('frontend/index.js', 'r+', encoding='utf-8') as f:
              content = f.read()
              content = re.sub(r'APP_VERSION:\s*".*"', f'APP_VERSION: "{version}"', content)
              f.seek(0)
              f.write(content)
              f.truncate()

      - name: Build App
        run: cargo tauri build ${{ matrix.args }}
        working-directory: src-tauri

      - name: Prepare Artifacts (Windows)
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          $exe = Get-ChildItem -Path "target" -Filter "coinman-portfolio.exe" -Recurse | Where-Object { $_.FullName -like "*release*" } | Select-Object -First 1
          if (-not $exe) { throw "Could not find coinman-portfolio.exe" }
          Compress-Archive -Path $exe.FullName -DestinationPath "coinman-portfolio-windows-x64.zip"
          echo "ASSET_PATH=coinman-portfolio-windows-x64.zip" >> $env:GITHUB_ENV
          echo "ASSET_NAME=coinman-portfolio-windows-x64.zip" >> $env:GITHUB_ENV

      - name: Prepare Artifacts (macOS)
        if: matrix.platform == 'macos-latest'
        shell: bash
        run: |
          TARGET=$(echo "${{ matrix.args }}" | grep -oE "[a-zA-Z0-9_-]+-apple-darwin")
          ARCH=$(echo "$TARGET" | cut -d'-' -f1)
          cp target/$TARGET/release/bundle/dmg/*.dmg coinman-portfolio-macos-$ARCH.dmg
          echo "ASSET_PATH=coinman-portfolio-macos-$ARCH.dmg" >> $GITHUB_ENV
          echo "ASSET_NAME=coinman-portfolio-macos-$ARCH.dmg" >> $GITHUB_ENV

      - name: Prepare Artifacts (Linux)
        if: matrix.platform == 'ubuntu-22.04'
        shell: bash
        run: |
          cp target/release/coinman-portfolio .
          tar -czf coinman-portfolio-linux-x64.tar.gz coinman-portfolio
          echo "ASSET_PATH=coinman-portfolio-linux-x64.tar.gz" >> $GITHUB_ENV
          echo "ASSET_NAME=coinman-portfolio-linux-x64.tar.gz" >> $GITHUB_ENV

      - name: Upload files to GH release
        uses: svenstaro/upload-release-action@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          tag: ${{ github.ref_name }}
          file: ${{ env.ASSET_PATH }}
          asset_name: ${{ env.ASSET_NAME }}
          overwrite: true
          prerelease: ${{ contains(github.ref_name, '-') }}

      - name: Upload artifacts (on branch push)
        if: "!startsWith(github.ref, 'refs/tags/')"
        uses: actions/upload-artifact@v6
        with:
          name: coinman-portfolio-${{ runner.os }}-${{ strategy.job-index }}
          path: ${{ env.ASSET_PATH }}
          retention-days: 7
